name: CI Pipeline - Validação de Código

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest 

    # Avisa o robô que os comandos devem ser rodados dentro da subpasta!
    defaults:
      run:
        working-directory: ./DevOps-test

    steps:
    - name: 📥 Clonando o repositório
      uses: actions/checkout@v4

    - name: ⚙️ Configurando o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Instalando dependências
      run: npm install

    - name: 🏗️ Testando o Build do projeto
      run: npm run build